name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - name: Validate tag and app version
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          app_version="$(/usr/libexec/PlistBuddy \
            -c 'Print :CFBundleShortVersionString' \
            Resources/Info.plist)"

          if [[ "$tag_version" != "$app_version" ]]; then
            echo "Tag version $tag_version does not match app version $app_version"
            exit 1
          fi

      - name: Run tests
        run: make test

      - name: Build universal DMG
        run: make dmg

      - name: Generate checksum
        shell: bash
        run: |
          dmg="dist/Password Bridge-${GITHUB_REF_NAME#v}-universal.dmg"
          shasum -a 256 "$dmg" > "$dmg.sha256"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          dmg="dist/Password Bridge-$version-universal.dmg"

          gh release create "$GITHUB_REF_NAME" \
            "$dmg" \
            "$dmg.sha256" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --generate-notes \
            --latest \
            --title "Password Bridge $version" \
            --notes "此版本使用临时签名，未经过 Apple Developer ID 签名和公证。首次启动时，请在 Finder 的应用程序中右键 Password Bridge 并选择打开；如果仍被拦截，请前往系统设置 > 隐私与安全性，点击仍要打开。"
